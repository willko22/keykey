# Keykey shared configuration
# This file controls rendering/app-group behavior only.
# Raw key counts in stats.json are never transformed.

[heatmap]

# Group split control: higher value makes promotion to next color group harder.
devider = 2

# If difference percent is ABOVE this threshold, start a new group.
threshold = 1

[apps]
# Any entry here excludes matching apps from tracking and UI.
# Matching is case-insensitive against exe/path/label and window title.
exclude = ["ScreenClippingHost", "SearchApp", "ClippingTool", "SnippingTool", "Keykey", "Taskmgr"]

[apps.groups]
# Match rules by executable stem/name/label/path substring.
game = ["dota2"]
coding = []
office = []
creative = []

[apps.title_contains]
# Additional title substring rules, useful for apps without stable exe paths.
game = ["dota", "counter-strike"]
coding = ["code", "pycharm", "cursor"]
office = ["excel", "word", "powerpoint", "outlook"]
creative = ["photoshop", "illustrator", "blender", "premiere", "kicad", "gimp", "inkscape"]

